services:
  postgres:
    image: postgres:16
    container_name: dda_postgres
    environment:
      POSTGRES_DB: dda
      POSTGRES_USER: dda
      POSTGRES_PASSWORD: dda
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dda -d dda"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dda_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes  # AOF persistence for local dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dda_api
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://dda:dda@postgres:5432/dda
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../examples:/examples

volumes:
  postgres_data:
  redis_data:

