# Example dbt MetricFlow semantic layer — generated by DB Discovery Agent
# Source: TPC-H benchmark dataset (scale factor 0.01)
# To regenerate: python docker/seed_tpch.py  then  POST /api/v1/jobs with duckdb source

semantic_models:
  - name: orders
    model: ref('orders')
    description: One row per customer order placed in the system.
    defaults:
      agg_time_dimension: ordered_at
    entities:
      - name: order
        type: primary
        expr: o_orderkey
        description: Unique identifier for each order
      - name: customer
        type: foreign
        expr: o_custkey
        description: Customer who placed the order
    dimensions:
      - name: order_status
        type: categorical
        expr: o_orderstatus
        description: Current status of the order (O=open, F=fulfilled, P=partially filled)
      - name: ordered_at
        type: time
        expr: o_orderdate
        description: Date the order was placed
        type_params:
          time_granularity: day
    measures:
      - name: order_count
        agg: count
        expr: o_orderkey
        description: Total number of orders
      - name: total_revenue
        agg: sum
        expr: o_totalprice
        description: Sum of total price across all orders

  - name: lineitem
    model: ref('lineitem')
    description: One row per line item within an order — the grain of most revenue metrics.
    defaults:
      agg_time_dimension: ship_date
    entities:
      - name: lineitem
        type: primary
        expr: l_orderkey
        description: Order key (composite PK with l_linenumber)
      - name: order
        type: foreign
        expr: l_orderkey
        description: Parent order
      - name: part
        type: foreign
        expr: l_partkey
        description: Part ordered
      - name: supplier
        type: foreign
        expr: l_suppkey
        description: Supplier fulfilling this line
    dimensions:
      - name: ship_mode
        type: categorical
        expr: l_shipmode
        description: Shipping method (AIR, MAIL, SHIP, TRUCK, etc.)
      - name: return_flag
        type: categorical
        expr: l_returnflag
        description: Whether the item was returned (R=returned, A=accepted, N=none)
      - name: line_status
        type: categorical
        expr: l_linestatus
        description: Line item status (O=open, F=fulfilled)
      - name: ship_date
        type: time
        expr: l_shipdate
        description: Date the item was shipped
        type_params:
          time_granularity: day
      - name: commit_date
        type: time
        expr: l_commitdate
        description: Committed delivery date
        type_params:
          time_granularity: day
    measures:
      - name: line_item_count
        agg: count
        expr: l_orderkey
        description: Total number of line items
      - name: total_extended_price
        agg: sum
        expr: l_extendedprice
        description: Sum of extended price (before discounts and taxes)
      - name: total_discount_amount
        agg: sum
        expr: "l_extendedprice * l_discount"
        description: Total discount amount applied
      - name: total_revenue
        agg: sum
        expr: "l_extendedprice * (1 - l_discount)"
        description: Revenue after discounts, before tax
      - name: average_discount
        agg: avg
        expr: l_discount
        description: Average discount rate

  - name: customer
    model: ref('customer')
    description: One row per registered customer.
    entities:
      - name: customer
        type: primary
        expr: c_custkey
        description: Unique customer identifier
      - name: nation
        type: foreign
        expr: c_nationkey
        description: Customer's nation
    dimensions:
      - name: market_segment
        type: categorical
        expr: c_mktsegment
        description: Market segment the customer belongs to (AUTOMOBILE, BUILDING, etc.)
    measures:
      - name: customer_count
        agg: count
        expr: c_custkey
        description: Total number of customers
      - name: average_account_balance
        agg: avg
        expr: c_acctbal
        description: Average account balance across customers

  - name: part
    model: ref('part')
    description: One row per part in the product catalog.
    entities:
      - name: part
        type: primary
        expr: p_partkey
        description: Unique part identifier
    dimensions:
      - name: brand
        type: categorical
        expr: p_brand
        description: Brand of the part
      - name: part_type
        type: categorical
        expr: p_type
        description: Full type string including material and finish
      - name: container
        type: categorical
        expr: p_container
        description: Packaging container type
    measures:
      - name: part_count
        agg: count
        expr: p_partkey
        description: Total number of distinct parts
      - name: average_retail_price
        agg: avg
        expr: p_retailprice
        description: Average retail price across all parts

  - name: supplier
    model: ref('supplier')
    description: One row per supplier.
    entities:
      - name: supplier
        type: primary
        expr: s_suppkey
        description: Unique supplier identifier
      - name: nation
        type: foreign
        expr: s_nationkey
        description: Supplier's nation
    measures:
      - name: supplier_count
        agg: count
        expr: s_suppkey
        description: Total number of suppliers

  - name: nation
    model: ref('nation')
    description: Reference table — one row per nation.
    entities:
      - name: nation
        type: primary
        expr: n_nationkey
        description: Unique nation identifier
      - name: region
        type: foreign
        expr: n_regionkey
        description: Region the nation belongs to
    dimensions:
      - name: nation_name
        type: categorical
        expr: n_name
        description: Name of the nation

  - name: region
    model: ref('region')
    description: Reference table — one row per geographic region.
    entities:
      - name: region
        type: primary
        expr: r_regionkey
        description: Unique region identifier
    dimensions:
      - name: region_name
        type: categorical
        expr: r_name
        description: Name of the region (AFRICA, AMERICA, ASIA, EUROPE, MIDDLE EAST)
